<footer class="py-20 border-t border-ink/5 mt-20">
    <div class="reading-container flex flex-col items-center gap-6 text-center">
        <p class="text-[10px] uppercase tracking-[0.4em] text-muted font-bold">
            Mind the Lines
        </p>
        <p class="font-serif italic text-muted text-sm">
            {{ .Site.Params.description }}
        </p>
        <nav class="flex items-center gap-2 text-[9px] uppercase tracking-widest font-bold text-muted">
            <a href="/" class="hover:text-ink transition-colors">Home</a>
            <span class="text-ink/20">·</span>
            <a href="/categories/" class="hover:text-ink transition-colors">Categories</a>
            <span class="text-ink/20">·</span>
            <a href="/about/" class="hover:text-ink transition-colors">About</a>
        </nav>
        <p class="text-[9px] uppercase tracking-widest text-muted/50">
            © {{ now.Year }} Kartikeyan Sundaresan
        </p>
    </div>
    <div id="reading-progress"></div>

    <button id="back-to-top" aria-label="Back to top"
        class="hidden md:block fixed bottom-8 right-8 z-50 opacity-0 translate-y-4 transition-all duration-300 pointer-events-none text-[9px] uppercase tracking-[0.3em] font-bold text-muted hover:text-ink bg-paper border border-ink/10 hover:border-ink/20 rounded-full px-4 py-3">
        ↑ Top
    </button>

    <script>
        const progressBar = document.getElementById("reading-progress");
        const backToTop = document.getElementById("back-to-top");

        if (backToTop) {
            backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        }

        let rafPending = false;
        window.addEventListener('scroll', () => {
            if (rafPending) return;
            rafPending = true;
            requestAnimationFrame(() => {
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;

                if (progressBar) {
                    progressBar.style.width = ((winScroll / height) * 100) + "%";
                }

                if (backToTop) {
                    const visible = winScroll > 400;
                    backToTop.classList.toggle('opacity-0', !visible);
                    backToTop.classList.toggle('translate-y-4', !visible);
                    backToTop.classList.toggle('pointer-events-none', !visible);
                }

                rafPending = false;
            });
        });

        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    revealObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal-on-scroll, .prose-content p').forEach(el => revealObserver.observe(el));

        document.querySelectorAll('.lightbox-trigger').forEach(img => {
            img.onclick = () => {
                const modal = document.createElement('div');
                modal.className = "fixed inset-0 bg-ink/98 z-[10001] flex items-center justify-center p-4 cursor-zoom-out animate-reveal";
                modal.innerHTML = `<img src="${img.src}" class="max-h-full max-w-full shadow-2xl rounded-sm">`;
                modal.onclick = () => modal.remove();
                document.body.appendChild(modal);
            };
        });
    </script>
</footer>
