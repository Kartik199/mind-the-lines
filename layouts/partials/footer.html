<footer class="py-20 border-t border-line mt-20">
    <div class="reading-container flex flex-col items-center gap-6 text-center">
        <p class="label-wide text-muted">
            {{ .Site.Title }}
        </p>
        <p class="font-serif italic text-muted text-sm">
            {{ .Site.Params.tagline }}
        </p>
        <nav class="flex items-center gap-2 label text-muted">
            <a href="/" class="hover:text-ink transition-colors py-1">Home</a>
            <span class="text-ink/20">·</span>
            <a href="/categories/" class="hover:text-ink transition-colors py-1">Categories</a>
            <span class="text-ink/20">·</span>
            <a href="/about/" class="hover:text-ink transition-colors py-1">About</a>
        </nav>
        <p class="label text-muted">
            © {{ now.Year }}{{ with .Site.Params.author }} {{ . }}{{ end }}
        </p>
    </div>
    {{ if .IsPage }}
    <div id="reading-progress"></div>
    {{ end }}

    <button id="back-to-top" aria-label="Back to top"
        class="hidden md:block fixed bottom-8 right-8 z-50 opacity-0 translate-y-4 transition-all duration-300 pointer-events-none label text-muted hover:text-ink bg-paper border border-line hover:border-ink/20 rounded-full px-4 py-3 cursor-pointer">
        ↑ Top
    </button>

    <script>
        const progressBar = document.getElementById("reading-progress");
        const backToTop = document.getElementById("back-to-top");
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

        if (backToTop) {
            backToTop.addEventListener('click', () => window.scrollTo({
                top: 0,
                behavior: prefersReducedMotion.matches ? 'auto' : 'smooth'
            }));
        }

        let rafPending = false;
        window.addEventListener('scroll', () => {
            if (rafPending) return;
            rafPending = true;
            requestAnimationFrame(() => {
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;

                if (progressBar) {
                    progressBar.style.width = ((winScroll / height) * 100) + "%";
                }

                if (backToTop) {
                    const visible = winScroll > 400;
                    backToTop.classList.toggle('opacity-0', !visible);
                    backToTop.classList.toggle('translate-y-4', !visible);
                    backToTop.classList.toggle('pointer-events-none', !visible);
                }

                rafPending = false;
            });
        });

        if (prefersReducedMotion.matches) {
            document.querySelectorAll('.reveal-on-scroll, .prose-content p').forEach(el => el.classList.add('is-visible'));
        } else {
            const revealObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        revealObserver.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal-on-scroll, .prose-content p').forEach(el => revealObserver.observe(el));
        }

        document.querySelectorAll('.lightbox-trigger').forEach(img => {
            img.tabIndex = 0;
            img.setAttribute('role', 'button');
            img.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); img.click(); }
            });
            img.addEventListener('click', () => {
                const modal = document.createElement('div');
                modal.className = "fixed inset-0 bg-[rgb(12,11,9)]/95 z-[10001] flex items-center justify-center p-4 cursor-zoom-out";
                modal.setAttribute('role', 'dialog');
                modal.setAttribute('aria-modal', 'true');
                modal.setAttribute('aria-label', img.alt || 'Enlarged image');
                modal.tabIndex = -1;
                if (!prefersReducedMotion.matches) modal.classList.add('animate-reveal');

                const full = document.createElement('img');
                full.src = img.src;
                full.alt = img.alt || '';
                full.className = "max-h-full max-w-full shadow-lifted rounded-sm";
                modal.appendChild(full);

                const onKey = (e) => { if (e.key === 'Escape') close(); };
                const close = () => {
                    modal.remove();
                    document.removeEventListener('keydown', onKey);
                    img.focus({ preventScroll: true });
                };
                modal.addEventListener('click', close);
                document.addEventListener('keydown', onKey);

                document.body.appendChild(modal);
                modal.focus();
            });
        });
    </script>
</footer>
