<header class="w-full py-8 border-b border-ink/5">
    <div class="reading-container flex justify-between items-center mx-auto max-w-2xl px-6">
        <a href="/" class="text-2xl font-serif italic tracking-tight text-ink">Mind the Lines</a>

        <nav class="flex flex-col items-end">
            <h3 class="text-[10px] uppercase tracking-[0.3em] text-muted mb-4">The Mind Drawer</h3>
            <ul class="flex gap-6">
                {{/* Use Hugo's internal Taxonomy list which is guaranteed to exist if the .md files have categories
                */}}
                {{ range $name, $taxonomy := .Site.Taxonomies.categories }}
                <li>
                    <a href="/categories/{{ $name | urlize }}/"
                        class="text-[11px] uppercase tracking-[0.2em] font-bold text-ink hover:text-muted transition-colors">
                        {{ $name | humanize }}
                    </a>
                </li>
                {{ end }}
            </ul>
        </nav>
    </div>
</header>
