<header class="fixed top-0 left-0 w-full z-50 bg-paper/80 backdrop-blur-md border-b border-ink/5" data-pagefind-ignore>
    <div id="header-grid" class="max-w-[1400px] mx-auto px-6 md:px-12 h-24 flex items-center justify-between">
        <div class="flex-1">
            <a href="/" class="group">
                <h1
                    class="text-2xl md:text-3xl font-serif italic text-ink tracking-tight group-hover:text-muted transition-colors">
                    Mind the Lines
                </h1>
            </a>
        </div>

        <div class="hidden md:flex flex-1 justify-center">
            <button id="search-trigger"
                class="text-[10px] uppercase tracking-[0.4em] font-bold text-muted hover:text-ink transition-all cursor-pointer border-none bg-transparent outline-none py-2 px-6 border border-ink/5 rounded-full hover:border-ink/20">
                Search [ / ]
            </button>
        </div>

        <div class="flex-1 flex items-center justify-end gap-6 md:gap-12">
            <button id="search-trigger-mobile" class="md:hidden text-muted hover:text-ink outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>

            <nav class="hidden md:flex items-center gap-12">
                <div class="relative group cursor-pointer py-4 outline-none" tabindex="0">
                    <span
                        class="text-[10px] uppercase tracking-[0.3em] font-bold text-muted group-hover:text-ink transition-colors flex items-center gap-2">
                        Categories <span
                            class="text-[8px] opacity-40 group-hover:rotate-180 transition-transform duration-300">▼</span>
                    </span>
                    <div
                        class="absolute right-0 top-full pt-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 transform translate-y-2 group-hover:translate-y-0">
                        <div class="bg-paper border border-ink/10 shadow-2xl py-6 min-w-[220px] rounded-sm">
                            {{ range .Site.Taxonomies.categories }}
                            <a href="{{ .Page.Permalink }}"
                                class="block px-8 py-3 text-[10px] uppercase tracking-[0.2em] text-muted hover:text-ink hover:bg-ink/[0.03] transition-colors">{{
                                .Page.Title }}</a>
                            {{ end }}
                        </div>
                    </div>
                </div>
                <a href="/about"
                    class="text-[10px] uppercase tracking-[0.3em] font-bold text-muted hover:text-ink transition-colors">About</a>
            </nav>

            <button id="mobile-menu-open" class="md:hidden text-muted py-2 outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>

    <div id="mobile-nav" class="fixed inset-0 z-[200] hidden bg-[#F5F2E9] p-8">
        <div class="flex justify-end mb-16">
            <button id="mobile-nav-close"
                class="text-muted text-[10px] uppercase tracking-[0.4em] font-bold">Close</button>
        </div>
        <div class="flex flex-col gap-10">
            <a href="/categories" class="text-4xl font-serif italic text-ink">Categories</a>
            <a href="/about" class="text-4xl font-serif italic text-ink">About</a>
        </div>
    </div>
</header>
