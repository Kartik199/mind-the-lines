{{ define "main" }}
<article class="about-page reading-container pt-12 pb-24 flex flex-col items-center text-center">
    <header class="mb-16 reveal-on-scroll">
        <h1 class="text-4xl md:text-5xl font-serif italic text-ink tracking-tight mb-4">About</h1>
        {{ with .Site.Params.tagline }}
        <p class="font-serif italic text-lg md:text-xl text-muted text-balance">{{ . }}</p>
        {{ end }}
    </header>
    <div class="prose-content no-dropcap reveal-on-scroll flex flex-col items-center">
        {{ .Content }}
    </div>
</article>
{{ end }}
