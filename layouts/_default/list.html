{{ define "main" }}
<section class="reading-container py-20">
    <h2 class="text-3xl font-serif mb-10">Latest Musings</h2>
    <div class="space-y-12">
        {{ range .Paginator.Pages }}
        <div class="group">
            <a href="{{ .RelPermalink }}">
                <h3 class="text-2xl group-hover:text-muted transition-colors">{{ .Title }}</h3>
                <p class="text-muted text-base mt-2 line-clamp-2">{{ .Summary }}</p>
            </a>
        </div>
        {{ end }}
    </div>
</section>
{{ end }}
