{{ define "main" }}
<section class="max-w-2xl mx-auto px-6 py-24">
    <div class="space-y-24">
        {{ range .Paginator.Pages }}
        <article class="group">
            <time class="text-[10px] uppercase tracking-[0.3em] text-muted mb-4 block">
                {{ .Date.Format "January 02, 2006" }}
            </time>
            <a href="{{ .RelPermalink }}" class="block">
                <h2 class="text-4xl font-serif italic mb-4 text-ink group-hover:text-muted transition-colors leading-tight">
                    {{ .Title }}
                </h2>
                <p class="text-muted text-lg leading-relaxed font-serif line-clamp-3">
                    {{ .Summary | plainify }}
                </p>
                <span class="inline-block mt-6 text-[10px] uppercase tracking-[0.4em] font-bold border-b border-ink/10 pb-1 group-hover:border-ink transition-all">
                    Read Story
                </span>
            </a>
        </article>
        {{ end }}
    </div>
</section>
{{ end }}
