{{ define "main" }}
<section class="reading-container pt-8 pb-24">
    <header class="mb-16 border-b border-line pb-10 reveal-on-scroll">
        <span class="label-wide text-muted block mb-4">Browse</span>
        <h1 class="text-5xl font-serif italic text-ink tracking-tight">Categories</h1>
    </header>

    <div class="space-y-4">
        {{ range .Data.Terms.Alphabetical }}
        <div class="border-b border-line reveal-on-scroll">
            <button
                class="category-toggle w-full flex items-center justify-between py-10 group cursor-pointer">
                <div class="text-left">
                    <h2 class="text-2xl font-serif text-ink group-hover:italic transition-all capitalize">
                        {{ .Page.Title }}
                    </h2>
                    <p class="category-description hidden mt-4 text-muted text-sm italic font-serif max-w-md">
                        {{ .Page.Params.description }}
                    </p>
                </div>
                <div class="flex items-center gap-8">
                    <span class="text-sm font-serif italic text-muted whitespace-nowrap">{{ .Count }} {{ if eq .Count 1 }}Story{{ else }}Stories{{ end }}</span>
                    <span class="toggle-icon text-2xl transition-transform duration-300">+</span>
                </div>
            </button>

            <div class="category-content hidden pb-12 pl-4">
                <ul class="space-y-6 border-l border-line pl-8">
                    {{ range .Pages }}
                    <li>
                        <a href="{{ .RelPermalink }}"
                            class="group flex flex-col md:flex-row md:items-baseline justify-between gap-2">
                            <h3 class="text-xl font-serif text-ink group-hover:text-muted transition-colors">
                                {{ .Title }}
                            </h3>
                            <time class="label text-muted whitespace-nowrap">
                                {{ .Date.Format "Jan 2006" }}
                            </time>
                        </a>
                    </li>
                    {{ end }}
                    <li class="pt-4">
                        <a href="{{ .Page.Permalink }}"
                            class="label text-ink hover:text-muted transition-colors">
                            View Full Section →
                        </a>
                    </li>
                </ul>
            </div>
        </div>
        {{ end }}
    </div>
</section>

<script>
    document.querySelectorAll('.category-toggle').forEach(button => {
        button.onclick = () => {
            const content = button.nextElementSibling;
            const description = button.querySelector('.category-description');
            const icon = button.querySelector('.toggle-icon');
            const isHidden = content.classList.contains('hidden');

            document.querySelectorAll('.category-content, .category-description').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.toggle-icon').forEach(i => i.innerHTML = "+");

            if (isHidden) {
                content.classList.remove('hidden');
                description.classList.remove('hidden');
                icon.innerHTML = "−";
            }
        };
    });
</script>
{{ end }}
