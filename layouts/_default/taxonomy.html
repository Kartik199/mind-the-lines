{{ define "main" }}
<section class="w-full max-w-full px-8 py-24">
    <header class="mb-16 border-b border-ink/5 pb-10">
        <span class="text-[10px] uppercase tracking-[0.5em] text-muted font-bold block mb-4">Section Archive</span>
        <h1 class="text-5xl font-serif italic text-ink tracking-tight capitalize">{{ .Title }}</h1>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 2xl:grid-cols-4 gap-12 items-start">
        {{ range .Paginator.Pages }}
        <article
            class="relative flex flex-col group bg-paper border border-ink/[0.03] rounded-sm p-8 shadow-sm hover:shadow-xl hover:border-ink/10 hover:-translate-y-1 transition-all duration-500 ease-out">

            <div class="mb-8 overflow-hidden rounded-xs aspect-video bg-ink/[0.02]">
                {{ if .Params.heroImage }}
                <img src="{{ .Params.heroImage }}" alt="{{ .Title }}"
                    class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000">
                {{ end }}
            </div>

            <div class="flex items-center justify-between mb-4">
                <time class="text-[10px] uppercase tracking-[0.25em] text-muted/60 font-bold">
                    {{ .Date.Format "Jan 02, 2006" }}
                </time>
            </div>

            <h2 class="text-3xl font-serif italic text-ink group-hover:text-muted transition-colors leading-tight mb-4">
                {{ .Title }}
            </h2>

            <p class="text-muted leading-relaxed text-sm line-clamp-3 mb-2">
                {{ .Summary | plainify }}
            </p>

            <a href="{{ .RelPermalink }}" class="absolute inset-0 z-10" aria-label="Read {{ .Title }}"></a>
        </article>
        {{ end }}
    </div>
</section>
{{ end }}
