{{ define "main" }}
<main class="max-w-4xl mx-auto px-6 py-20">
    <header class="mb-12 border-b border-ink/10 pb-8">
        <span class="text-xs uppercase tracking-widest text-muted mb-2 block">Archive</span>
        <h1 class="text-5xl font-serif italic text-ink capitalize">
            {{ .Title }}
        </h1>
    </header>

    <div class="grid gap-12">
        {{ range .Pages }}
        <article>
            <a href="{{ .Permalink }}" class="group">
                <time class="text-xs font-mono text-muted">{{ .Date.Format "Jan 02, 2006" }}</time>
                <h2 class="text-2xl font-serif italic group-hover:underline decoration-1 underline-offset-4">
                    {{ .Title }}
                </h2>
            </a>
        </article>
        {{ end }}
    </div>
</main>
{{ end }}
