{{ define "main" }}
<article class="reading-container pt-8 pb-24">
    <header class="mb-12">
        <div class="flex items-center gap-4 mb-4 text-[10px] uppercase tracking-[0.5em] text-muted font-bold">
            <time>{{ .Date.Format "January 02, 2006" }}</time>
            {{ with .Params.categories }}
            <span class="h-[1px] w-8 bg-ink/10"></span>
            {{ range . }}<span>{{ . }}</span>{{ end }}
            {{ end }}
        </div>

        <h1 class="text-5xl md:text-6xl font-serif italic text-ink leading-[1.1] tracking-tight">
            {{ .Title }}
        </h1>
    </header>

    <div class="prose-content">
        {{ .Content }}
    </div>

    {{ if .Params.tags }}
    <footer class="mt-24 pt-10 border-t border-ink/5 flex gap-4">
        {{ range .Params.tags }}
        <span class="text-[10px] uppercase tracking-widest text-muted border border-ink/10 px-3 py-1 rounded-full">
            #{{ . }}
        </span>
        {{ end }}
    </footer>
    {{ end }}
</article>
{{ end }}
