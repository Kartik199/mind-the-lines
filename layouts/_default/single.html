{{ define "main" }}
{{ $post := index (where $.Site.Data.posts "slug" .Slug) 0 }}

<article class="pb-24">
    {{ if $post.heroImageUrl }}
    <div class="w-full h-[60vh] relative overflow-hidden bg-ink mb-16">
        <img src="{{ $post.heroImageUrl }}" class="w-full h-full object-cover" alt="{{ $post.title }}">
    </div>
    {{ end }}

    <header class="reading-container mb-12 mx-auto max-w-2xl px-6">
        {{ if $post.categories }}
        <div class="flex flex-wrap gap-3 mb-6">
            {{ range $post.categories }}
            <a href="/categories/{{ .title | urlize }}/"
                class="text-[10px] uppercase tracking-[0.3em] font-bold text-muted border border-ink/10 px-3 py-1 rounded-full hover:bg-ink hover:text-white transition-all">
                {{ .title }}
            </a>
            {{ end }}
        </div>
        {{ end }}

        <h1 class="text-5xl font-serif italic leading-tight">{{ $post.title }}</h1>
    </header>

    <div class="reading-container prose mx-auto max-w-2xl px-6">
        {{ partial "portable-text.html" $post.body }}
    </div>
</article>
{{ end }}
