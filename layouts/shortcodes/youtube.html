<div class="my-10 w-full clear-both">
    <div class="relative w-full rounded-sm shadow-lifted overflow-hidden bg-black" style="padding-top: 56.25%; height: 0;">
        <iframe src="https://www.youtube.com/embed/{{ .Get 0 }}"
            class="absolute top-0 left-0 w-full h-full border-0"
            style="margin: 0; padding: 0; vertical-align: top;"
            allowfullscreen loading="lazy">
        </iframe>
    </div>
    <a href="https://www.youtube.com/watch?v={{ .Get 0 }}"
        target="_blank" rel="noopener noreferrer"
        class="mt-3 label text-muted hover:text-ink transition-colors inline-flex items-center gap-1">
        Watch on YouTube →
    </a>
</div>
