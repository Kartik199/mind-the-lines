baseURL = '/'  # Changed from Netlify URL to relative for local dev stability
languageCode = 'en-us'
title = 'Mind the Lines'
pagerSize = 6

[taxonomies]
  category = "categories"

[permalinks]
  categories = "/categories/:slug/"
  posts = "/:slug/"

[params]
  description = "A journal of cinema, society, and the lines that stay."
  ogImage = ""

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true 

[frontmatter]
  # Helps Hugo handle special characters in titles more gracefully
  removePathAccents = true