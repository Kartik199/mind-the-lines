baseURL = '/'  # Changed from Netlify URL to relative for local dev stability
languageCode = 'en-us'
title = 'Mind the Lines'
pagerSize = 6

[taxonomies]
  category = "categories"

[permalinks]
  categories = "/categories/:slug/"
  posts = "/:slug/"

[params]
  # description = the plain SEO/meta-tag sentence (search results, social cards)
  # tagline     = the displayed catchphrase (footer, mobile menu, About header)
  description = "Personal essays on books, sport, film, TV, and politics — and the lines where they cross."
  tagline = "Party lines, plot lines, punch lines."
  author = "Kartikeyan Sundaresan"
  ogImage = "/images/og-default.png"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true 

[frontmatter]
  # Helps Hugo handle special characters in titles more gracefully
  removePathAccents = true